<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>혼자 할 일 가챠</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

    :root {
      --bg: #fff8fd;
      --paper: #fffef8;
      --ink: #27222b;
      --muted: #7b7180;
      --pink: #ff9fc9;
      --pink2: #ffd7e8;
      --violet: #bda7ff;
      --blue: #b9e9ff;
      --mint: #c9f7df;
      --yellow: #fff0a8;
      --line: #2b2630;
      --shadow: 4px 5px 0 rgba(43, 38, 48, .16);
      --soft-shadow: 0 12px 30px rgba(117, 84, 140, .16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Gaegu', ui-rounded, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 12%, rgba(255, 159, 201, .35) 0 7px, transparent 8px),
        radial-gradient(circle at 84% 18%, rgba(189, 167, 255, .35) 0 9px, transparent 10px),
        radial-gradient(circle at 78% 86%, rgba(185, 233, 255, .55) 0 11px, transparent 12px),
        linear-gradient(135deg, #fff8fd 0%, #f9fbff 48%, #fffdf3 100%);
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 430px);
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 14px 24px;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1.8px solid var(--line);
      background: rgba(255, 254, 248, .74);
      border-radius: 999px;
      box-shadow: 2px 3px 0 rgba(43, 38, 48, .09);
      transform: rotate(-1deg);
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--violet));
      border: 1.6px solid var(--line);
    }

    .brand-title {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -.02em;
      line-height: 1;
    }

    .top-actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .round-mini {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.8px solid var(--line);
      background: var(--paper);
      box-shadow: 2px 3px 0 rgba(43, 38, 48, .14);
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .round-mini:active,
    .draw-btn:active,
    .tiny-btn:active,
    .pill:active,
    .value-toggle:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 rgba(43, 38, 48, 0);
    }

    .stage {
      position: relative;
      min-height: 490px;
      border: 2px solid var(--line);
      border-radius: 30px;
      background:
        linear-gradient(rgba(255,255,255,.42) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.42) 1px, transparent 1px),
        linear-gradient(155deg, rgba(255, 215, 232, .78), rgba(255, 254, 248, .86) 43%, rgba(201, 247, 223, .56));
      background-size: 23px 23px, 23px 23px, auto;
      box-shadow: var(--shadow);
      padding: 18px 16px 16px;
      overflow: hidden;
    }

    .sticker {
      position: absolute;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(1px 2px 0 rgba(43,38,48,.12));
      opacity: .9;
    }

    .s1 { top: 18px; right: 26px; font-size: 20px; transform: rotate(13deg); }
    .s2 { top: 94px; left: 24px; font-size: 17px; transform: rotate(-16deg); }
    .s3 { bottom: 120px; right: 24px; font-size: 18px; transform: rotate(10deg); }
    .s4 { bottom: 27px; left: 30px; font-size: 16px; transform: rotate(-10deg); }

    .main-copy {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 6px;
    }

    .tiny-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border: 1.5px dashed rgba(43, 38, 48, .58);
      border-radius: 999px;
      background: rgba(255,255,255,.54);
      font-size: 14px;
      color: var(--muted);
      line-height: 1;
    }

    .jar-wrap {
      position: relative;
      width: 190px;
      height: 205px;
      margin: 30px auto 13px;
    }

    .jar-lid {
      position: absolute;
      top: 7px;
      left: 48px;
      width: 94px;
      height: 28px;
      border: 2px solid var(--line);
      border-radius: 18px 18px 8px 8px;
      background: linear-gradient(180deg, #fff6aa, #ffd36f);
      box-shadow: 2px 3px 0 rgba(43, 38, 48, .15);
      z-index: 3;
    }

    .jar {
      position: absolute;
      left: 23px;
      top: 28px;
      width: 145px;
      height: 164px;
      border: 2.2px solid var(--line);
      border-radius: 28px 28px 42px 42px;
      background: linear-gradient(150deg, rgba(255,255,255,.78), rgba(185,233,255,.42) 52%, rgba(255,159,201,.18));
      box-shadow: inset 10px 0 0 rgba(255,255,255,.36), var(--soft-shadow);
      overflow: hidden;
      z-index: 2;
    }

    .jar:before {
      content: '';
      position: absolute;
      top: 18px;
      left: 20px;
      width: 18px;
      height: 78px;
      border-radius: 999px;
      background: rgba(255,255,255,.46);
      transform: rotate(10deg);
    }

    .jar:after {
      content: '';
      position: absolute;
      bottom: 16px;
      left: 18px;
      right: 18px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .24);
      border: 1px dashed rgba(43,38,48,.24);
    }

    .capsule {
      position: absolute;
      width: 48px;
      height: 25px;
      border: 1.8px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(90deg, var(--pink) 0 50%, #fffdf5 50% 100%);
      box-shadow: 1px 2px 0 rgba(43, 38, 48, .13);
      z-index: 3;
    }

    .capsule:after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1.7px;
      background: var(--line);
      opacity: .9;
    }

    .c1 { left: 47px; top: 85px; transform: rotate(-16deg); background: linear-gradient(90deg, var(--pink) 0 50%, #fffdf5 50% 100%); }
    .c2 { left: 92px; top: 100px; transform: rotate(20deg); background: linear-gradient(90deg, var(--blue) 0 50%, #fffdf5 50% 100%); }
    .c3 { left: 61px; top: 125px; transform: rotate(10deg); background: linear-gradient(90deg, var(--mint) 0 50%, #fffdf5 50% 100%); }
    .c4 { left: 96px; top: 137px; transform: rotate(-20deg); background: linear-gradient(90deg, var(--violet) 0 50%, #fffdf5 50% 100%); }

    .picked-capsule {
      position: absolute;
      left: 70px;
      top: 52px;
      width: 55px;
      height: 29px;
      border: 2px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(90deg, #ff7fba 0 50%, #fffdf5 50% 100%);
      box-shadow: 3px 4px 0 rgba(43, 38, 48, .16);
      opacity: 0;
      z-index: 5;
      transform: translateY(65px) rotate(-8deg) scale(.7);
    }

    .picked-capsule:after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--line);
    }

    .jar-wrap.is-drawing .jar-lid { animation: lid-hop .52s ease; }
    .jar-wrap.is-drawing .jar { animation: jar-shake .52s ease; }
    .jar-wrap.is-drawing .picked-capsule { animation: pop-capsule .7s cubic-bezier(.16, 1.1, .32, 1) forwards; }

    @keyframes jar-shake {
      0%, 100% { transform: rotate(0); }
      22% { transform: rotate(-3deg); }
      44% { transform: rotate(3deg); }
      66% { transform: rotate(-2deg); }
      88% { transform: rotate(2deg); }
    }

    @keyframes lid-hop {
      0%, 100% { transform: translateY(0) rotate(0); }
      45% { transform: translateY(-9px) rotate(-5deg); }
    }

    @keyframes pop-capsule {
      0% { opacity: 0; transform: translateY(65px) rotate(-8deg) scale(.65); }
      35% { opacity: 1; transform: translateY(-8px) rotate(12deg) scale(1.08); }
      100% { opacity: 1; transform: translateY(5px) rotate(-7deg) scale(1); }
    }

    .result-card {
      position: relative;
      z-index: 1;
      width: min(100%, 310px);
      min-height: 94px;
      margin: 0 auto 14px;
      padding: 13px 13px 12px;
      border: 2px solid var(--line);
      border-radius: 21px;
      background: rgba(255, 254, 248, .82);
      box-shadow: 3px 4px 0 rgba(43,38,48,.12);
      text-align: left;
    }

    .result-empty {
      text-align: center;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.25;
      padding-top: 16px;
    }

    .result-task {
      font-weight: 700;
      font-size: 22px;
      line-height: 1.14;
      word-break: keep-all;
      text-align: center;
      padding: 7px 4px 9px;
    }

    .result-tags,
    .tagline {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag-chip,
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1.4px solid rgba(43,38,48,.55);
      background: rgba(255,255,255,.62);
      font-size: 13px;
      line-height: 1;
    }

    .tag-chip:nth-child(3n+1) { background: rgba(255, 215, 232, .44); }
    .tag-chip:nth-child(3n+2) { background: rgba(185, 233, 255, .44); }
    .tag-chip:nth-child(3n) { background: rgba(201, 247, 223, .44); }

    .main-controls {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .draw-btn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2.2px solid var(--line);
      background: radial-gradient(circle at 32% 24%, #fff 0 9%, transparent 10%), linear-gradient(135deg, #ff86bd, #bf9fff);
      color: #fffdf8;
      text-shadow: 1px 1px 0 rgba(43,38,48,.4);
      box-shadow: 4px 5px 0 rgba(43,38,48,.17);
      font-weight: 700;
      font-size: 23px;
      letter-spacing: -.03em;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }

    .draw-btn:disabled { opacity: .58; filter: grayscale(.2); cursor: default; }

    .mini-note {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 9px;
      min-height: 18px;
    }

    .filter-chipline {
      position: relative;
      z-index: 1;
      margin: 14px auto 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
      max-width: 310px;
      min-height: 22px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(39, 34, 43, .22);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      z-index: 20;
    }

    .overlay.is-open { display: flex; }

    .sheet {
      width: min(100%, 430px);
      max-height: min(82vh, 690px);
      overflow: auto;
      border: 2px solid var(--line);
      border-radius: 25px;
      background: linear-gradient(180deg, #fffef8, #fff7fd);
      box-shadow: 6px 8px 0 rgba(43, 38, 48, .18);
      padding: 12px;
      animation: sheet-up .18s ease-out;
    }

    @keyframes sheet-up {
      from { transform: translateY(12px); opacity: .7; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 2px 2px 10px;
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, #fffef8 78%, rgba(255,254,248,0));
      z-index: 2;
    }

    .sheet-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -.02em;
    }

    .sheet-title small {
      color: var(--muted);
      font-weight: 400;
      font-size: 13px;
    }

    .section {
      border: 1.7px solid rgba(43,38,48,.8);
      border-radius: 19px;
      background: rgba(255,255,255,.5);
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 2px 3px 0 rgba(43,38,48,.08);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .cat-row,
    .capsule-row,
    .filter-group {
      border: 1.5px solid rgba(43,38,48,.65);
      border-radius: 17px;
      background: #fffdf7;
      padding: 9px;
      margin-bottom: 8px;
    }

    .cat-top,
    .capsule-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .cat-name,
    .capsule-name,
    .filter-name {
      font-weight: 700;
      font-size: 17px;
      line-height: 1.05;
      word-break: keep-all;
    }

    .cat-count {
      color: var(--muted);
      font-size: 12px;
      margin-left: 4px;
      font-weight: 400;
    }

    .cat-actions,
    .capsule-actions {
      display: flex;
      gap: 5px;
      flex: 0 0 auto;
    }

    .tiny-btn {
      min-width: 27px;
      height: 27px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--yellow);
      box-shadow: 1.6px 2px 0 rgba(43,38,48,.12);
      font-size: 13px;
      line-height: 1;
      display: inline-grid;
      place-items: center;
    }

    .tiny-btn.soft { background: var(--pink2); }
    .tiny-btn.blue { background: var(--blue); }
    .tiny-btn.mint { background: var(--mint); }
    .tiny-btn.ghost { background: #fff; color: var(--muted); }

    .item-list,
    .value-list,
    .value-grid,
    .tag-selects {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }

    .item-pill,
    .value-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
      padding: 4px 6px 4px 9px;
      border-radius: 999px;
      border: 1.3px solid rgba(43,38,48,.56);
      background: rgba(255, 215, 232, .42);
      font-size: 14px;
      line-height: 1;
    }

    .item-pill:nth-child(3n+2),
    .value-pill:nth-child(3n+2) { background: rgba(185, 233, 255, .42); }
    .item-pill:nth-child(3n),
    .value-pill:nth-child(3n) { background: rgba(201, 247, 223, .42); }

    .item-name {
      max-width: 195px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .x-btn {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.2px solid rgba(43,38,48,.7);
      background: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .mini-form {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .mini-input,
    .mini-select {
      width: 100%;
      height: 31px;
      border: 1.6px solid var(--line);
      border-radius: 999px;
      padding: 0 11px;
      background: rgba(255,255,255,.82);
      outline: none;
      font-size: 15px;
      box-shadow: inset 1px 1px 0 rgba(43,38,48,.05);
    }

    .mini-input:focus,
    .mini-select:focus { background: #fff; box-shadow: 0 0 0 3px rgba(189, 167, 255, .20); }

    .tag-select {
      display: grid;
      gap: 3px;
      flex: 1 1 118px;
      min-width: 118px;
    }

    .tag-select label {
      color: var(--muted);
      font-size: 12px;
      padding-left: 6px;
      line-height: 1;
    }

    .value-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 28px;
      padding: 0 9px 0 5px;
      border-radius: 999px;
      border: 1.5px solid rgba(43,38,48,.65);
      background: rgba(255,255,255,.6);
      box-shadow: 1.4px 1.8px 0 rgba(43,38,48,.09);
      font-size: 14px;
      line-height: 1;
    }

    .dot-toggle {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1.5px solid var(--line);
      background: #fff;
      display: inline-block;
      flex: 0 0 auto;
    }

    .value-toggle.is-on {
      background: rgba(255, 215, 232, .7);
    }

    .value-toggle.is-on .dot-toggle {
      background: linear-gradient(135deg, var(--pink), var(--violet));
    }

    .footer-row {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
      padding-top: 3px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
      border: 1.6px solid var(--line);
      border-radius: 999px;
      background: #fffef8;
      box-shadow: 3px 4px 0 rgba(43,38,48,.14);
      padding: 7px 12px;
      font-size: 14px;
      transition: .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 360px) {
      .app { padding: 11px 10px 20px; }
      .stage { min-height: 475px; padding-left: 12px; padding-right: 12px; }
      .brand-title { font-size: 16px; }
      .round-mini { width: 32px; height: 32px; }
      .jar-wrap { margin-top: 25px; }
      .draw-btn { width: 80px; height: 80px; font-size: 21px; }
      .result-task { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" aria-label="앱 제목">
        <span class="brand-dot"></span>
        <span class="brand-title">혼자 가챠</span>
      </div>
      <div class="top-actions">
        <button class="round-mini" id="openFilter" type="button" aria-label="필터">◌</button>
        <button class="round-mini" id="openSettings" type="button" aria-label="설정">＋</button>
      </div>
    </header>

    <main class="stage">
      <span class="sticker s1">✦</span>
      <span class="sticker s2">♡</span>
      <span class="sticker s3">✧</span>
      <span class="sticker s4">☁</span>

      <div class="main-copy">
        <span class="tiny-label">오늘 혼자 뭐하지?</span>
      </div>

      <section class="jar-wrap" id="jarWrap" aria-hidden="true">
        <div class="jar-lid"></div>
        <div class="jar">
          <div class="capsule c1"></div>
          <div class="capsule c2"></div>
          <div class="capsule c3"></div>
          <div class="capsule c4"></div>
        </div>
        <div class="picked-capsule"></div>
      </section>

      <section class="result-card" id="resultCard" aria-live="polite">
        <div class="result-empty">draw</div>
      </section>

      <div class="main-controls">
        <button class="round-mini" id="quickAdd" type="button" aria-label="캡슐 추가">＋</button>
        <button class="draw-btn" id="drawBtn" type="button">draw</button>
        <button class="round-mini" id="quickFilter" type="button" aria-label="필터">◌</button>
      </div>

      <div class="filter-chipline" id="chipLine"></div>
      <div class="mini-note" id="miniNote"></div>
    </main>
  </div>

  <div class="overlay" id="filterOverlay" aria-hidden="true">
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="filterTitle">
      <div class="sheet-head">
        <div class="sheet-title" id="filterTitle">필터 <small id="filterSmall"></small></div>
        <button class="round-mini" id="closeFilter" type="button" aria-label="닫기">×</button>
      </div>
      <div id="filterList"></div>
      <div class="footer-row">
        <button class="tiny-btn ghost" id="clearFilter" type="button">reset</button>
        <button class="tiny-btn blue" id="doneFilter" type="button">done</button>
      </div>
    </section>
  </div>

  <div class="overlay" id="settingsOverlay" aria-hidden="true">
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="sheet-head">
        <div class="sheet-title" id="settingsTitle">캡슐장 <small>edit</small></div>
        <button class="round-mini" id="closeSettings" type="button" aria-label="닫기">×</button>
      </div>

      <section class="section">
        <div class="section-title">카테고리</div>
        <form class="mini-form" id="addCategoryForm">
          <input class="mini-input" id="categoryInput" type="text" maxlength="18" placeholder="예: 장소, 종류, 예산" />
          <button class="tiny-btn" type="submit">＋</button>
        </form>
        <div id="categoryList" style="margin-top:8px;"></div>
      </section>

      <section class="section">
        <div class="section-title">캡슐</div>
        <form id="addCapsuleForm">
          <input class="mini-input" id="capsuleInput" type="text" maxlength="44" placeholder="할일" />
          <div class="tag-selects" id="newCapsuleTags" style="margin-top:7px;"></div>
          <div class="footer-row">
            <button class="tiny-btn" type="submit">＋</button>
          </div>
        </form>
      </section>

      <section class="section">
        <div id="capsuleList"></div>
      </section>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'solo-gacha-free-categories-v1';

    const defaultState = {
      selected: {},
      categories: [
        {
          id: 'place',
          name: '장소',
          values: [
            { id: 'p_namyangju', name: '남양주' },
            { id: 'p_home', name: '내집' },
            { id: 'p_seocho', name: '서초' }
          ]
        },
        {
          id: 'type',
          name: '종류',
          values: [
            { id: 't_groom', name: '그루밍' },
            { id: 't_play', name: '놀기' },
            { id: 't_walk', name: '산책' }
          ]
        }
      ],
      capsules: [
        { id: 'a1', text: '향 좋은 바디로션 바르기', tags: { place: 'p_home', type: 't_groom' } },
        { id: 'a2', text: '손톱 정리하고 투명 매니큐어', tags: { place: 'p_home', type: 't_groom' } },
        { id: 'a3', text: '카페에서 달달한 음료 하나', tags: { place: 'p_namyangju', type: 't_play' } },
        { id: 'a4', text: '문구점 들러서 스티커 구경', tags: { place: 'p_seocho', type: 't_play' } },
        { id: 'a5', text: '햇빛 적은 길로 20분 걷기', tags: { place: 'p_namyangju', type: 't_walk' } },
        { id: 'a6', text: '팩 올리고 멍때리기', tags: { place: 'p_home', type: 't_groom' } }
      ]
    };

    let state = loadState();

    const $ = (selector) => document.querySelector(selector);

    const els = {
      jarWrap: $('#jarWrap'),
      resultCard: $('#resultCard'),
      chipLine: $('#chipLine'),
      miniNote: $('#miniNote'),
      drawBtn: $('#drawBtn'),
      openFilter: $('#openFilter'),
      quickFilter: $('#quickFilter'),
      closeFilter: $('#closeFilter'),
      doneFilter: $('#doneFilter'),
      clearFilter: $('#clearFilter'),
      filterOverlay: $('#filterOverlay'),
      filterList: $('#filterList'),
      filterSmall: $('#filterSmall'),
      openSettings: $('#openSettings'),
      quickAdd: $('#quickAdd'),
      closeSettings: $('#closeSettings'),
      settingsOverlay: $('#settingsOverlay'),
      addCategoryForm: $('#addCategoryForm'),
      categoryInput: $('#categoryInput'),
      categoryList: $('#categoryList'),
      addCapsuleForm: $('#addCapsuleForm'),
      capsuleInput: $('#capsuleInput'),
      newCapsuleTags: $('#newCapsuleTags'),
      capsuleList: $('#capsuleList'),
      toast: $('#toast')
    };

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function uid(prefix = 'id') {
      return prefix + '_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(defaultState);
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.categories) || !Array.isArray(parsed.capsules)) return clone(defaultState);
        parsed.selected = parsed.selected && typeof parsed.selected === 'object' ? parsed.selected : {};
        parsed.categories = parsed.categories
          .filter(cat => cat && cat.id && typeof cat.name === 'string')
          .map(cat => ({
            id: String(cat.id),
            name: String(cat.name).trim() || '무제',
            values: Array.isArray(cat.values)
              ? cat.values.filter(v => v && v.id && typeof v.name === 'string').map(v => ({ id: String(v.id), name: String(v.name).trim() || '무제' }))
              : []
          }));
        parsed.capsules = parsed.capsules
          .filter(item => item && item.id && typeof item.text === 'string')
          .map(item => ({ id: String(item.id), text: String(item.text).trim() || '무제', tags: item.tags && typeof item.tags === 'object' ? item.tags : {} }));
        cleanState(parsed);
        if (!parsed.categories.length) parsed.categories = clone(defaultState.categories);
        return parsed;
      } catch (error) {
        return clone(defaultState);
      }
    }

    function cleanState(target = state) {
      const categoryIds = new Set(target.categories.map(cat => cat.id));
      const valueIdsByCat = Object.fromEntries(target.categories.map(cat => [cat.id, new Set(cat.values.map(v => v.id))]));

      Object.keys(target.selected || {}).forEach(catId => {
        if (!categoryIds.has(catId)) delete target.selected[catId];
      });

      target.categories.forEach(cat => {
        const selected = Array.isArray(target.selected[cat.id]) ? target.selected[cat.id] : [];
        target.selected[cat.id] = selected.filter(valueId => valueIdsByCat[cat.id].has(valueId));
        if (!target.selected[cat.id].length) delete target.selected[cat.id];
      });

      target.capsules.forEach(capsule => {
        const tags = capsule.tags && typeof capsule.tags === 'object' ? capsule.tags : {};
        Object.keys(tags).forEach(catId => {
          if (!categoryIds.has(catId) || !valueIdsByCat[catId].has(tags[catId])) delete tags[catId];
        });
        capsule.tags = tags;
      });
    }

    function saveState() {
      cleanState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function getCategory(catId) {
      return state.categories.find(cat => cat.id === catId);
    }

    function getValue(catId, valueId) {
      const cat = getCategory(catId);
      return cat ? cat.values.find(value => value.id === valueId) : null;
    }

    function openOverlay(overlay) {
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeOverlay(overlay) {
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden', 'true');
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove('show'), 1000);
    }

    function selectedEntries() {
      return Object.entries(state.selected || {}).filter(([, valueIds]) => Array.isArray(valueIds) && valueIds.length);
    }

    function selectedCount() {
      return selectedEntries().reduce((sum, [, values]) => sum + values.length, 0);
    }

    function renderAll() {
      renderChips();
      renderMiniNote();
      renderFilterList();
      renderCategoryList();
      renderNewCapsuleTags();
      renderCapsuleList();
    }

    function renderChips() {
      const chips = [];
      selectedEntries().forEach(([catId, valueIds]) => {
        const cat = getCategory(catId);
        if (!cat) return;
        valueIds.forEach(valueId => {
          const value = getValue(catId, valueId);
          if (value) chips.push(`<span class="filter-chip">${escapeHtml(cat.name)} · ${escapeHtml(value.name)}</span>`);
        });
      });
      els.chipLine.innerHTML = chips.length ? chips.join('') : '<span class="filter-chip">전체 랜덤</span>';
    }

    function renderMiniNote() {
      els.miniNote.textContent = `${state.categories.length} filters · ${state.capsules.length} capsules`;
    }

    function renderFilterList() {
      els.filterSmall.textContent = selectedCount() ? `${selectedCount()} on` : 'all';
      if (!state.categories.length) {
        els.filterList.innerHTML = '';
        return;
      }
      els.filterList.innerHTML = state.categories.map(cat => `
        <div class="filter-group" data-filter-cat-id="${escapeHtml(cat.id)}">
          <div class="section-title">${escapeHtml(cat.name)}</div>
          <div class="value-grid">
            ${cat.values.map(value => {
              const on = Array.isArray(state.selected[cat.id]) && state.selected[cat.id].includes(value.id);
              return `
                <button class="value-toggle ${on ? 'is-on' : ''}" type="button" data-filter-value-id="${escapeHtml(value.id)}">
                  <span class="dot-toggle"></span><span>${escapeHtml(value.name)}</span>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderCategoryList() {
      if (!state.categories.length) {
        els.categoryList.innerHTML = '';
        return;
      }
      els.categoryList.innerHTML = state.categories.map(cat => `
        <div class="cat-row" data-cat-id="${escapeHtml(cat.id)}">
          <div class="cat-top">
            <div class="cat-name">${escapeHtml(cat.name)} <span class="cat-count">${cat.values.length}</span></div>
            <div class="cat-actions">
              <button class="tiny-btn blue" type="button" data-action="rename-category">수정</button>
              <button class="tiny-btn soft" type="button" data-action="delete-category">삭제</button>
            </div>
          </div>
          <div class="value-list">
            ${cat.values.map((value, index) => `
              <span class="value-pill">
                <button class="x-btn" type="button" data-action="edit-value" data-index="${index}" aria-label="값 수정">✎</button>
                <span class="item-name">${escapeHtml(value.name)}</span>
                <button class="x-btn" type="button" data-action="delete-value" data-index="${index}" aria-label="값 삭제">×</button>
              </span>
            `).join('')}
          </div>
          <form class="mini-form" data-action="add-value-form">
            <input class="mini-input" type="text" maxlength="20" placeholder="옵션 추가" />
            <button class="tiny-btn" type="submit">＋</button>
          </form>
        </div>
      `).join('');
    }

    function renderNewCapsuleTags() {
      els.newCapsuleTags.innerHTML = state.categories.map(cat => `
        <div class="tag-select">
          <label>${escapeHtml(cat.name)}</label>
          <select class="mini-select" data-new-tag-cat-id="${escapeHtml(cat.id)}">
            <option value="">-</option>
            ${cat.values.map(value => `<option value="${escapeHtml(value.id)}">${escapeHtml(value.name)}</option>`).join('')}
          </select>
        </div>
      `).join('');
    }

    function capsuleTagChips(capsule) {
      const chips = [];
      state.categories.forEach(cat => {
        const value = getValue(cat.id, capsule.tags[cat.id]);
        if (value) chips.push(`<span class="tag-chip">${escapeHtml(cat.name)} · ${escapeHtml(value.name)}</span>`);
      });
      return chips.join('');
    }

    function renderCapsuleList() {
      if (!state.capsules.length) {
        els.capsuleList.innerHTML = '';
        return;
      }
      els.capsuleList.innerHTML = state.capsules.map(capsule => `
        <div class="capsule-row" data-capsule-id="${escapeHtml(capsule.id)}">
          <div class="capsule-top">
            <div class="capsule-name">${escapeHtml(capsule.text)}</div>
            <div class="capsule-actions">
              <button class="tiny-btn blue" type="button" data-action="edit-capsule">수정</button>
              <button class="tiny-btn soft" type="button" data-action="delete-capsule">삭제</button>
            </div>
          </div>
          <div class="tagline">${capsuleTagChips(capsule)}</div>
        </div>
      `).join('');
    }

    function capsuleMatches(capsule) {
      return selectedEntries().every(([catId, valueIds]) => valueIds.includes(capsule.tags[catId]));
    }

    function draw() {
      const pool = state.capsules.filter(capsuleMatches);
      if (!state.capsules.length) {
        renderEmptyResult('캡슐 없음');
        return;
      }
      if (!pool.length) {
        renderEmptyResult('맞는 캡슐 없음');
        return;
      }
      const result = randomFrom(pool);
      els.drawBtn.disabled = true;
      els.jarWrap.classList.remove('is-drawing');
      void els.jarWrap.offsetWidth;
      els.jarWrap.classList.add('is-drawing');
      setTimeout(() => {
        renderResult(result);
        els.drawBtn.disabled = false;
      }, 520);
    }

    function renderEmptyResult(text) {
      els.resultCard.innerHTML = `<div class="result-empty">${escapeHtml(text)}</div>`;
    }

    function renderResult(capsule) {
      els.resultCard.innerHTML = `
        <div class="result-task">${escapeHtml(capsule.text)}</div>
        <div class="result-tags">${capsuleTagChips(capsule)}</div>
      `;
    }

    function addCategory(name) {
      const clean = name.trim().slice(0, 18);
      if (!clean) return;
      state.categories.push({ id: uid('cat'), name: clean, values: [] });
      saveState();
      showToast('added');
    }

    function renameCategory(catId) {
      const cat = getCategory(catId);
      if (!cat) return;
      const next = prompt('카테고리 이름', cat.name);
      if (next === null) return;
      const clean = next.trim().slice(0, 18);
      if (!clean) return;
      cat.name = clean;
      saveState();
    }

    function deleteCategory(catId) {
      const cat = getCategory(catId);
      if (!cat) return;
      if (!confirm(`'${cat.name}' 삭제?`)) return;
      state.categories = state.categories.filter(item => item.id !== catId);
      delete state.selected[catId];
      state.capsules.forEach(capsule => delete capsule.tags[catId]);
      saveState();
      showToast('deleted');
    }

    function addValue(catId, valueName) {
      const cat = getCategory(catId);
      if (!cat) return;
      const clean = valueName.trim().slice(0, 20);
      if (!clean) return;
      cat.values.push({ id: uid('v'), name: clean });
      saveState();
      showToast('added');
    }

    function editValue(catId, index) {
      const cat = getCategory(catId);
      if (!cat || !cat.values[index]) return;
      const next = prompt('옵션 이름', cat.values[index].name);
      if (next === null) return;
      const clean = next.trim().slice(0, 20);
      if (!clean) return;
      cat.values[index].name = clean;
      saveState();
    }

    function deleteValue(catId, index) {
      const cat = getCategory(catId);
      if (!cat || !cat.values[index]) return;
      const valueId = cat.values[index].id;
      cat.values.splice(index, 1);
      if (Array.isArray(state.selected[catId])) {
        state.selected[catId] = state.selected[catId].filter(id => id !== valueId);
      }
      state.capsules.forEach(capsule => {
        if (capsule.tags[catId] === valueId) delete capsule.tags[catId];
      });
      saveState();
    }

    function addCapsule() {
      const text = els.capsuleInput.value.trim().slice(0, 44);
      if (!text) return;
      const tags = {};
      els.newCapsuleTags.querySelectorAll('[data-new-tag-cat-id]').forEach(select => {
        if (select.value) tags[select.dataset.newTagCatId] = select.value;
      });
      state.capsules.unshift({ id: uid('capsule'), text, tags });
      els.capsuleInput.value = '';
      els.newCapsuleTags.querySelectorAll('select').forEach(select => select.value = '');
      saveState();
      showToast('added');
    }

    function editCapsule(capsuleId) {
      const capsule = state.capsules.find(item => item.id === capsuleId);
      if (!capsule) return;
      const nextText = prompt('할일', capsule.text);
      if (nextText === null) return;
      const clean = nextText.trim().slice(0, 44);
      if (!clean) return;
      const nextTags = { ...capsule.tags };

      for (const cat of state.categories) {
        if (!cat.values.length) {
          delete nextTags[cat.id];
          continue;
        }
        const currentValueId = nextTags[cat.id] || '';
        const currentIndex = cat.values.findIndex(value => value.id === currentValueId);
        const list = cat.values.map((value, index) => `${index + 1}. ${value.name}`).join('\n');
        const answer = prompt(`${cat.name}\n0. -\n${list}`, currentIndex >= 0 ? String(currentIndex + 1) : '0');
        if (answer === null) return;
        const number = Number(answer.trim());
        if (!number) {
          delete nextTags[cat.id];
        } else if (cat.values[number - 1]) {
          nextTags[cat.id] = cat.values[number - 1].id;
        }
      }

      capsule.text = clean;
      capsule.tags = nextTags;
      saveState();
    }

    function deleteCapsule(capsuleId) {
      state.capsules = state.capsules.filter(item => item.id !== capsuleId);
      saveState();
    }

    function toggleFilter(catId, valueId) {
      const selected = Array.isArray(state.selected[catId]) ? state.selected[catId] : [];
      if (selected.includes(valueId)) {
        state.selected[catId] = selected.filter(id => id !== valueId);
      } else {
        state.selected[catId] = [...selected, valueId];
      }
      if (!state.selected[catId].length) delete state.selected[catId];
      saveState();
    }

    els.drawBtn.addEventListener('click', draw);
    els.openFilter.addEventListener('click', () => openOverlay(els.filterOverlay));
    els.quickFilter.addEventListener('click', () => openOverlay(els.filterOverlay));
    els.closeFilter.addEventListener('click', () => closeOverlay(els.filterOverlay));
    els.doneFilter.addEventListener('click', () => closeOverlay(els.filterOverlay));
    els.clearFilter.addEventListener('click', () => {
      state.selected = {};
      saveState();
    });

    els.openSettings.addEventListener('click', () => openOverlay(els.settingsOverlay));
    els.quickAdd.addEventListener('click', () => openOverlay(els.settingsOverlay));
    els.closeSettings.addEventListener('click', () => closeOverlay(els.settingsOverlay));

    els.filterOverlay.addEventListener('click', (event) => {
      if (event.target === els.filterOverlay) closeOverlay(els.filterOverlay);
    });

    els.settingsOverlay.addEventListener('click', (event) => {
      if (event.target === els.settingsOverlay) closeOverlay(els.settingsOverlay);
    });

    els.filterList.addEventListener('click', (event) => {
      const button = event.target.closest('[data-filter-value-id]');
      if (!button) return;
      const group = button.closest('[data-filter-cat-id]');
      if (!group) return;
      toggleFilter(group.dataset.filterCatId, button.dataset.filterValueId);
    });

    els.addCategoryForm.addEventListener('submit', (event) => {
      event.preventDefault();
      addCategory(els.categoryInput.value);
      els.categoryInput.value = '';
      els.categoryInput.focus();
    });

    els.categoryList.addEventListener('submit', (event) => {
      const form = event.target.closest('[data-action="add-value-form"]');
      if (!form) return;
      event.preventDefault();
      const row = form.closest('[data-cat-id]');
      const input = form.querySelector('input');
      addValue(row.dataset.catId, input.value);
      input.value = '';
      input.focus();
    });

    els.categoryList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const row = button.closest('[data-cat-id]');
      if (!row) return;
      const catId = row.dataset.catId;
      const action = button.dataset.action;
      const index = Number(button.dataset.index);

      if (action === 'rename-category') renameCategory(catId);
      if (action === 'delete-category') deleteCategory(catId);
      if (action === 'edit-value') editValue(catId, index);
      if (action === 'delete-value') deleteValue(catId, index);
    });

    els.addCapsuleForm.addEventListener('submit', (event) => {
      event.preventDefault();
      addCapsule();
    });

    els.capsuleList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const row = button.closest('[data-capsule-id]');
      if (!row) return;
      if (button.dataset.action === 'edit-capsule') editCapsule(row.dataset.capsuleId);
      if (button.dataset.action === 'delete-capsule') deleteCapsule(row.dataset.capsuleId);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      closeOverlay(els.filterOverlay);
      closeOverlay(els.settingsOverlay);
    });

    renderAll();
  </script>
</body>
</html>
